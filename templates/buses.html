<!DOCTYPE html>
<html>
<head>
<title>Buses</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
<h2>Cloud Bus Booking</h2>
<div>
<a href="/home">Home</a>
<a href="/buses">Buses</a>
<a href="/booking">Booking</a>
</div>
</nav>

<h1 class="center">Available Buses</h1>

<div class="bus-container">
{% for bus in buses %}
<div class="bus-card">
<img src="{{ bus.image }}">
<h2>{{ bus.name }}</h2>
<p>{{ bus.route }}</p>
<h3>{{ bus.price }}</h3>
</div>
{% endfor %}
</div>

</body>
</html>
